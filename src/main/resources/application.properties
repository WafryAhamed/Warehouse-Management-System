spring.application.name=warehouse-backend
spring.profiles.active=dev

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database Configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/warehouse_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQL10Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Logging
logging.level.root=INFO
logging.level.com.wafry.warehouse=DEBUG
logging.level.org.springframework.security=DEBUG

# JWT Configuration
jwt.secret.key=your-super-secret-jwt-key-change-in-production-with-long-random-string
jwt.expiration.ms=86400000
jwt.refresh.expiration.ms=604800000

# Application Settings
app.name=Warehouse Management System
app.version=1.0.0
app.description=Production-ready WMS Backend API

# CORS Configuration
app.cors.allowed-origins=http://localhost:8080,http://localhost:3000
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
app.cors.allowed-headers=*
app.cors.allow-credentials=true
app.cors.max-age=3600

