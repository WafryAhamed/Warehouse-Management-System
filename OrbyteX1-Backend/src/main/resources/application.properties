# ============================
# OrbyteX1 Backend Configuration
# ============================

# Server Configuration
server.port=8080
server.servlet.context-path=/api/v1

# Application Name
spring.application.name=OrbyteX1-Backend

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/orbytex1
spring.datasource.username=postgres
spring.datasource.password=2001
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.orbytex=DEBUG
logging.level.org.springframework.security=DEBUG
logging.file.name=logs/orbytex1.log
logging.file.max-size=10MB
logging.file.max-history=10

# JWT Configuration
jwt.secret=OrbyteX1-SecureJWTTokenKey-2026-ProductionGrade-EnterpriseLevel-HighSecurity-RandomKey
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=http://localhost:8081,http://localhost:8082,*
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
cors.allowed-headers=*
cors.allow-credentials=true

# File Upload Configuration
file.upload-dir=uploads
file.max-size=5242880

# Liquibase Configuration
spring.liquibase.enabled=false

# Jackson Configuration
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Error Handling
server.error.include-message=always
server.error.include-binding-errors=always

