# Production Profile Configuration
spring.profiles.active=prod

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database Configuration (Production - Use Environment Variables!)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://prod-db-host:5432/warehouse_db}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:change-this-in-production}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQL10Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.fetch_size=50

# Logging (Production - Minimal)
logging.level.root=WARN
logging.level.com.wafry.inventory=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.file.name=/var/log/inventory-backend/application.log
logging.file.max-size=10MB
logging.file.max-history=30

# JWT Configuration (MUST CHANGE IN PRODUCTION!)
jwt.secret.key=${JWT_SECRET_KEY:change-this-to-a-very-long-random-string-in-production}
jwt.expiration.ms=86400000
jwt.refresh.expiration.ms=604800000

# Application Settings
app.name=Inventory Management System
app.version=1.0.0
app.description=Inventory Management System - Production

# CORS Configuration (Restrict in Production!)
app.cors.allowed-origins=${CORS_ORIGINS:https://your-domain.com,https://www.your-domain.com}
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
app.cors.allowed-headers=Authorization,Content-Type
app.cors.allow-credentials=true
app.cors.max-age=3600

# Swagger/OpenAPI (DISABLE in Production!)
springdoc.swagger-ui.enabled=false
springdoc.api-docs.path=/api-docs

# Security Headers
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict

# Performance
spring.jpa.properties.hibernate.generate_statistics=false
spring.jackson.serialization.write-dates-as-timestamps=false

