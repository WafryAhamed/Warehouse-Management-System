# Development Profile Configuration

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database Configuration (Local Development)
spring.datasource.url=jdbc:postgresql://localhost:5432/wms
spring.datasource.username=postgres
spring.datasource.password=2001
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20

# Logging
logging.level.root=INFO
logging.level.com.wafry.warehouse=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

# JWT Configuration
jwt.secret.key=dev-secret-key-change-in-production-12345678901234567890
jwt.expiration.ms=86400000
jwt.refresh.expiration.ms=604800000

# Application Settings
app.name=Warehouse Management System
app.version=3.0-ENTERPRISE
app.description=Warehouse Management System - Development

# CORS Configuration
app.cors.allowed-origins=http://localhost:8080,http://localhost:3000,http://localhost:8000
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
app.cors.allowed-headers=*
app.cors.allow-credentials=true
app.cors.max-age=3600

# Swagger/OpenAPI
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

